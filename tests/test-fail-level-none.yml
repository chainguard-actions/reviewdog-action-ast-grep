name: Test fail_level=none does not fail on issues
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run ast-grep action with fail_level=none (should not fail even with issues)
        id: action
        uses: .
        with:
          github_token: dummy-token
          workdir: .
          reporter: local
          filter_mode: nofilter
          fail_level: none
          level: error
          sg_config: sgconfig.yml
          output_dir: /tmp/reviewdog-results
      - name: Assert action did not fail despite finding issues
        run: |
          echo "Action completed with fail_level=none - no failure even with issues found"
          echo "PASS"
