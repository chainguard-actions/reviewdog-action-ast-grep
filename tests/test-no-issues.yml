name: Test no issues - ast-grep scan with no rules
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create empty rules directory for fixture
        run: |
          mkdir -p pristine/reviewdog--action-ast-grep/v1.57.0/tests/fixtures/empty-rules/rules
          echo "Empty rules directory created"

      - id: action
        uses: .
        with:
          github_token: fake-token-for-testing
          workdir: pristine/reviewdog--action-ast-grep/v1.57.0/tests/fixtures/empty-rules
          sg_config: sgconfig.yml
          reporter: github-check
          level: error
          fail_level: none
          output_dir: /tmp/reviewdog-results-no-issues
        continue-on-error: true

      - name: Assert action completed
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # With no rules, ast-grep should produce empty output and jq should succeed
          # The action may still fail due to reviewdog API with fake token
          # but we verify the output directory was created by the action
          if [ -d "/tmp/reviewdog-results-no-issues" ]; then
            echo "PASS: output directory created by action"
          else
            echo "FAIL: output directory was not created"
            exit 1
          fi
