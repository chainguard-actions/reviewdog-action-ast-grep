name: Test ast-grep with custom config
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run ast-grep action with custom config
        id: action
        uses: .
        with:
          github_token: dummy-token
          workdir: tests/fixtures/sg-custom
          reporter: local
          filter_mode: nofilter
          fail_level: none
          sg_config: sgconfig.yml
          output_dir: /tmp/reviewdog-results
      - name: Assert action completed successfully
        run: |
          echo "Action completed with custom config"
          echo "PASS"
